<section class="pt-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-8 col-md-6 col-lg-5">
        <div class="card border rounded-3 shadow-sm">
          <div class="card-body p-4">

            <div class="text-center mb-4">
              <div
                class="rounded-circle bg-primary bg-opacity-10 d-inline-flex align-items-center justify-content-center mb-3"
                style="width:52px; height:52px;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                  stroke="#185FA5" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </div>
              <h2 class="h5 fw-medium mb-1">User Login</h2>
              <p class="text-muted small mb-0">Fill in your details to get
                started</p>
            </div>

            <form [formGroup]="formGroup" (ngSubmit)="onSubmit()">

              <div class="mb-3">
                <label for="email" class="form-label small fw-medium">Email
                  Address</label>
                <input formControlName="email" type="email" id="email"
                  class="form-control"
                  placeholder="Enter email"
                  [class.is-valid]="_email.valid && _email.touched"
                  [class.is-invalid]="_email.invalid && _email.touched">
                <div class="invalid-feedback">
                  Please enter a valid email address.
                </div>
              </div>

              <div class="mb-4">
                <label for="password"
                  class="form-label small fw-medium">Password</label>
                <input formControlName="password" type="password" id="password"
                  class="form-control"
                  placeholder="Min 6 characters"
                  [class.is-valid]="_password.valid && _password.touched"
                  [class.is-invalid]="_password.invalid && _password.touched">
                <div class="invalid-feedback">
                  Password must be at least 6 characters, contain a capital
                  letter and a number.
                </div>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                  Login
                </button>
              </div>

              <div  class="d-grid mt-3 ">
                <!-- Button trigger modal -->
              <button type="button" class="btn btn-primary"
                data-bs-toggle="modal" data-bs-target="#exampleModal">
                Forget password
              </button>
              </div>

              <p class="text-center text-muted small mt-3 mb-0">
                Already have an account? <a routerLink="/account/register"
                  class="text-primary text-decoration-none">Sign up</a>
              </p>

            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1"
  aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Forget password</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal"
          aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input  class="form-control" [(ngModel)]="emailModule" type="email"  placeholder="Enter your email address">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary"
          data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" (click)="SendEmailForForgetPassword()">Send</button>
      </div>
    </div>
  </div>
</div>
